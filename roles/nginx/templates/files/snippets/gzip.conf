gzip                on;
gzip_vary           on;
gzip_proxied        any;
gzip_comp_level     6;
gzip_buffers        16 8k;
gzip_http_version   1.1;
gzip_min_length     256;
gzip_types
    application/atom+xml application/geo+json application/javascript
    application/x-javascript application/json application/ld+json
    application/manifest+json application/rdf+xml application/rss+xml
    application/vnd.ms-fontobject application/wasm application/xhtml+xml
    application/xml font/eot font/otf font/ttf image/bmp image/svg+xml
    image/vnd.microsoft.icon image/x-icon text/cache-manifest text/css
    text/javascript text/markdown text/plain text/xml text/vcard text/vtt
    text/x-component text/x-cross-domain-policy;