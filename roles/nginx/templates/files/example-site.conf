# Copy to /etc/nginx/sites-available/yourdomain.com and edit server_name + root
# Then: ln -s /etc/nginx/sites-available/yourdomain.com /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    root  /var/www/example.com/public;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include snippets/ssl.conf;
    include snippets/security.conf;
    include snippets/php-fpm.conf;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    limit_req  zone=general burst=20 nodelay;
    limit_conn addr 20;

    access_log /var/log/nginx/example.com-access.log main;
    error_log  /var/log/nginx/example.com-error.log warn;

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|woff|ttf|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}